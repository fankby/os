name: Build One by One (anyone)

on:
  workflow_dispatch:
    inputs:
      armbian_kernel_branch:
        type: choice
        description: 'Kernel branch'
        options:
          - Legacy
          - current
          - edge
          - vendor
        default: 'vendor'
      armbian_release:
        type: choice
        description: 'Release (Ubuntu 22.04=jammy)'
        options:
          - focal
          - jammy
          - lunar
          - mantic
          - noble
          - bookworm
          - trixie
          - sid
        default: 'jammy'
      armbian_ui:
        type: choice
        description: 'User interface (桌面环境)'
        options:
          - minimal
          - xfce
          - gnome
          - kde
          - mate
          - i3wm
        default: 'xfce'
      armbian_version:
        type: string
        description: 'Version (e.g., 24.5.0-trunk)'
        required: true
        default: '24.5.0-trunk'
      armbian_board:
        type: string
        description: 'Board (必须填hinlink-ht2)'
        required: true
        default: 'hinlink-ht2'
      armbian_release_tag:
        type: string
        description: 'Release tag (镜像名称核心参数)'
        required: true
        default: '24.5.0-trunk-ht2-ubuntu2204-xfce'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # 拉取完整历史，避免编译时缺失依赖

      - name: Set environment variables (确保参数传递)
        run: |
          echo "ARTIFACT_TAG=${{ inputs.armbian_release_tag }}" >> $GITHUB_ENV
          echo "BOARD=${{ inputs.armbian_board }}" >> $GITHUB_ENV
          echo "RELEASE=${{ inputs.armbian_release }}" >> $GITHUB_ENV
          echo "UI=${{ inputs.armbian_ui }}" >> $GITHUB_ENV
          echo "VERSION=${{ inputs.armbian_version }}" >> $GITHUB_ENV

      - name: Build Armbian (Ubuntu 22.04 桌面版 - 修复Artifact名称)
        uses: armbian/build@main
        with:
          armbian_token: "${{ secrets.GITHUB_TOKEN }}"
          armbian_target: "image"  # 关键：从artifact改为image（生成完整镜像，而非仅artifact）
          armbian_board: "${{ env.BOARD }}"
          armbian_release: "${{ env.RELEASE }}"
          armbian_kernel_branch: "${{ inputs.armbian_kernel_branch }}"
          armbian_ui: "${{ env.UI }}"
          armbian_version: "${{ env.VERSION }}"
          armbian_release_tag: "${{ env.ARTIFACT_TAG }}"  # 强制传递标签，生成镜像名称
          armbian_release_tittle: "Armbian-Ubuntu22.04-XFCE-Hinlink-ht2"
          armbian_release_body: "Hinlink-ht2适配 | Ubuntu 22.04 | XFCE桌面 | Vendor内核"
          armbian_compress: "xz"  # 指定压缩格式，确保生成.img.xz文件
          armbian_artifacts: "image"  # 明确输出镜像产物
          # 移除非必要参数（避免干扰名称生成）
          armbian_pgp_key: ""
          armbian_pgp_password: ""

      - name: Verify image exists
        run: |
          ls -l output/images/  # 查看生成的镜像文件（调试用）
          # 检查是否生成有效镜像文件
          if [ -z "$(find output/images/ -name '*.img.xz')" ]; then
              echo "错误：未生成镜像文件！"
              exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.ARTIFACT_TAG }}"
          path: output/images/*.img.xz  # 直接指向镜像输出目录（Armbian默认输出到output/images）
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.ARTIFACT_TAG }}"
          name: "Armbian ${{ env.VERSION }} - Hinlink-ht2 - Ubuntu 22.04 XFCE"
          body: |
            ### 适配信息
            - 开发板：Hinlink-ht2/Solo派B（RK3528A）
            - 系统：Ubuntu 22.04 LTS (Jammy)
            - 桌面环境：XFCE（轻量低耗）
            - 内核：${{ inputs.armbian_kernel_branch }}（RK原厂内核，硬件适配最优）
            - 镜像格式：.img.xz（需解压后烧录）
            
            ### 使用步骤
            1. 下载镜像文件并解压（得到.img文件）
            2. 用BalenaEtcher/Win32 Disk Imager烧录到SD卡/eMMC（建议≥8GB）
            3. 插入开发板，连接HDMI显示器+键盘鼠标，上电启动
            4. 首次登录：账号root，密码1234（强制修改密码后生效）
          files: output/images/*.img.xz
          draft: false
          prerelease: false
