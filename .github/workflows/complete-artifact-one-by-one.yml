name: Build Hinlink-ht2 Ubuntu 22.04 XFCE

on:
  workflow_dispatch:  # 仅手动触发，无额外输入

jobs:
  build-ht2-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - name: 检查Armbian OS仓库（确保compile.sh存在）
        uses: actions/checkout@v4
        with:
          repository: armbian/os  # 直接拉取官方仓库（避免Fork后路径错乱）
          submodules: recursive
          fetch-depth: 0
          path: armbian-os  # 明确指定检出目录，避免路径问题

      - name: 进入构建目录+补全系统依赖（解决127错误核心）
        run: |
          cd armbian-os
          # 安装Armbian编译必需依赖（含交叉编译、QEMU等核心工具）
          sudo apt update && sudo apt install -y --no-install-recommends \
            debootstrap qemu-user-static binfmt-support build-essential \
            gcc-aarch64-linux-gnu git flex bison libssl-dev python3-pip \
            python3-dev python3-setuptools parted dosfstools mtools \
            zstd xz-utils curl wget ca-certificates

          # 确保compile.sh有执行权限（关键：避免127权限不足）
          chmod +x compile.sh

          # 验证脚本是否存在（调试用，确保路径正确）
          if [ ! -f compile.sh ]; then
              echo "错误：未找到compile.sh脚本！"
              ls -la  # 列出目录内容，便于排查
              exit 1
          fi
          echo "compile.sh脚本存在且权限正常"

      - name: 硬编码参数+执行原生编译（绝对路径调用，避免命令未找到）
        run: |
          cd armbian-os  # 强制进入脚本所在目录
          # 硬编码所有参数（板型、系统、桌面等，无动态传递）
          BOARD="hinlink-ht2"
          RELEASE="jammy"  # Ubuntu 22.04
          BRANCH="current"  # 改用社区稳定内核（若vendor报错可换此选项）
          UI="xfce"
          VERSION="24.5.0-trunk"
          IMAGE_NAME="ht2-ubuntu2204-xfce-current-24.5.0"

          # 绝对路径执行编译脚本（彻底解决127命令未找到）
          ./compile.sh \
            BOARD="$BOARD" \
            RELEASE="$RELEASE" \
            BRANCH="$BRANCH" \
            BUILD_DESKTOP=yes \
            DESKTOP_ENVIRONMENT="$UI" \
            DESKTOP_APPGROUPS_SELECTED="browsers,utilities" \
            VERSION="$VERSION" \
            IMAGE_NAME="$IMAGE_NAME" \
            SHOW_DEBUG=yes \
            COMPRESS_IMAGE=xz \
            BUILD_MINIMAL=no \
            KERNEL_ONLY=no \
            KERNEL_CONFIGURE=no

      - name: 验证镜像生成（确保产物存在）
        run: |
          cd armbian-os
          ls -l output/images/  # 列出镜像目录，查看产物
          # 查找生成的镜像文件（兼容不同命名格式）
          IMAGE_FILE=$(find output/images/ -name "*.img.xz" -o -name "*.img.zst" | head -n1)
          if [ -z "$IMAGE_FILE" ]; then
              echo "错误：未生成镜像文件！"
              exit 1
          fi
          echo "镜像生成成功：$IMAGE_FILE"
          echo "IMAGE_FILE=$IMAGE_FILE" >> $GITHUB_ENV
          echo "IMAGE_NAME=$(basename "$IMAGE_FILE")" >> $GITHUB_ENV

      - name: 上传镜像产物（保留14天）
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}
          path: ${{ env.IMAGE_FILE }}
          retention-days: 14

      - name: 创建GitHub Release（方便下载）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.IMAGE_NAME }}
          name: Hinlink-ht2 - Ubuntu 22.04 XFCE - ${{ env.IMAGE_NAME }}
          body: |
            ### 适配信息
            - 开发板：Hinlink-ht2/Solo派B（RK3528A）
            - 系统：Ubuntu 22.04 LTS (Jammy)
            - 桌面环境：XFCE（轻量低耗，适配嵌入式硬件）
            - 内核：Armbian Current 稳定内核（兼容性更优）
            - 镜像格式：.img.xz/.img.zst（需解压后烧录）
            
            ### 烧录使用步骤
            1. 下载镜像文件（Releases附件）
            2. 解压：.img.xz用 `tar -xvf 文件名.img.xz`，.img.zst用 `unzstd 文件名.img.zst`
            3. 烧录工具：BalenaEtcher（推荐）/ Win32 Disk Imager（Windows）
            4. 存储介质：SD卡/eMMC（建议容量≥8GB，Class 10及以上）
            5. 首次登录：账号 root，密码 1234（登录后强制修改密码）
            
            ### 注意事项
            - 若WiFi/网口异常，可更换内核分支为 `vendor`（RK原厂内核）
            - 镜像默认开启SSH，可通过路由器查看开发板IP后远程登录
          files: ${{ env.IMAGE_FILE }}
          draft: false
          prerelease: false
