name: Build One by One (anyone)

on:
  workflow_dispatch:
    inputs:
      armbian_kernel_type:
        type: choice
        description: 'Kernel type'
        options:
          - current
          - edge
          - legacy
          - vendor
        default: 'vendor'
      armbian_kernel_branch:
        type: choice
        description: 'Kernel branch'
        options:
          - Legacy
          - current
          - edge
          - vendor
        default: 'vendor'
      armbian_release:
        type: choice
        description: 'Release (Ubuntu 22.04=jammy)'
        options:
          - focal
          - jammy
          - lunar
          - mantic
          - noble
          - bookworm
          - trixie
          - sid
        default: 'jammy'
      armbian_ui:
        type: choice
        description: 'User interface (桌面环境)'
        options:
          - minimal
          - xfce
          - gnome
          - kde
          - mate
          - i3wm
        default: 'xfce'
      armbian_version:
        type: string
        description: 'Version (e.g., 24.5.0-trunk)'
        required: true
        default: '24.5.0-trunk'
      armbian_board:
        type: string
        description: 'Board (必须填hinlink-ht2)'
        required: true
        default: 'hinlink-ht2'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Armbian (Ubuntu 22.04 桌面版)
        uses: armbian/build@main
        with:
          armbian_token: "${{ secrets.GITHUB_TOKEN }}"
          armbian_target: "artifact"
          armbian_release: "${{ inputs.armbian_release }}"
          armbian_kernel_branch: "${{ inputs.armbian_kernel_branch }}"
          armbian_ui: "${{ inputs.armbian_ui }}"
          armbian_board: "${{ inputs.armbian_board }}"
          armbian_version: "${{ inputs.armbian_version }}"
          armbian_pgp_key: "${{ secrets.GPG_KEY1 }}"
          armbian_pgp_password: "${{ secrets.GPG_PASSPHRASE1 }}"
          # 修复1：参数拼写错误（title→tittle，Armbian官方定义的参数名）
          armbian_release_tittle: "Armbian Ubuntu 22.04 桌面版 for Hinlink-ht2"
          armbian_release_body: "适配Hinlink-ht2/Solo派B，内核：${{ inputs.armbian_kernel_branch }}，桌面：XFCE"
          # 修复2：添加release_tag参数（避免Artifact名称为空）
          armbian_release_tag: "${{ inputs.armbian_version }}-ht2-ubuntu22.04-xfce"
          # 修复3：移除无效参数armbian_release_title（官方不支持）

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-Ubuntu22.04-XFCE-Hinlink-ht2
          path: output/artifact/*
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.armbian_version }}-ht2-ubuntu22.04-xfce"
          name: "Armbian ${{ inputs.armbian_version }} - Hinlink-ht2 - Ubuntu 22.04 XFCE"
          body: |
            ### 适配信息
            - 开发板：Hinlink-ht2/Solo派B
            - 系统：Ubuntu 22.04 LTS (Jammy)
            - 桌面环境：XFCE（轻量、低资源占用）
            - 内核：${{ inputs.armbian_kernel_branch }}（RK原厂内核，硬件适配最优）
            
            ### 使用说明
            1. 下载后缀为.img.xz的镜像文件
            2. 用BalenaEtcher等工具烧录到SD卡/eMMC
            3. 插入开发板，上电启动
            4. 默认账号：root，密码：1234（首次登录强制修改）
          files: output/artifact/*
          draft: false
          prerelease: false
