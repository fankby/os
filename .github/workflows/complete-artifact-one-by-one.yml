name: Build One by One (anyone)
on:
  workflow_dispatch:
    inputs:
      armbian_board:
        description: 'Board name (e.g. hinlink-ht2)'
        required: true
        default: 'hinlink-ht2'
        type: choice
        options:
          - hinlink-ht2
      armbian_userspace:
        description: 'Userspace (jammy = Ubuntu 22.04)'
        required: true
        default: 'jammy'
        type: choice
        options:
          - jammy
          - focal
          - bookworm
          - bullseye
      armbian_kernel_branch:
        description: 'Kernel branch (vendor = rk3528a 适配)'
        required: true
        default: 'vendor'
        type: choice
        options:
          - vendor
          - current
          - edge
      armbian_ui:
        description: 'User Interface (xfce = 轻量桌面)'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - gnome
          - kde
          - mate
          - minimal
      armbian_version:
        description: 'Armbian version (24.5.0-trunk = 兼容版)'
        required: true
        default: '24.5.0-trunk'
      armbian_build_target:
        description: 'Build target'
        required: true
        default: 'image'
        type: choice
        options:
          - image
          - rootfs
          - kernel
          - uboot
          - dtb

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Armbian OS repo
        uses: actions/checkout@v4
        with:
          repository: armbian/os
          ref: main
          fetch-depth: 0

      - name: Build Armbian image
        uses: armbian/build@main  # 升级到最新兼容版本
        with:
          armbian_board: ${{ inputs.armbian_board }}
          armbian_userspace: ${{ inputs.armbian_userspace }}
          armbian_kernel_branch: ${{ inputs.armbian_kernel_branch }}
          armbian_ui: ${{ inputs.armbian_ui }}
          armbian_version: ${{ inputs.armbian_version }}
          armbian_build_target: ${{ inputs.armbian_build_target }}
          armbian_config: |
            ENABLE_SSH=yes  # 默认开启 SSH（方便调试）
            USER_NAME=armbian  # 默认用户名
            USER_PASSWORD=1234  # 默认密码（可自行修改）
            ROOT_PASSWORD=1234  # root 密码（可自行修改）
            IMAGE_TYPE=desktop  # 强制桌面版镜像
            STORAGE_DEVICE=mmc  # 适配 HT2 eMMC/SD 卡启动
            BOOT_LOGO=armbian  # 保留默认 logo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: armbian-hinlink-ht2-ubuntu22.04-xfce
          path: ${{ github.workspace }}/output/images/*.img.xz  # 镜像压缩包路径
          retention-days: 30  # 镜像保留 30 天
