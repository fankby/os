name: Build One by One (anyone)

on:
  workflow_dispatch:
    inputs:
      armbian_target:
        type: choice
        description: 'Target'
        options:
          - image
          - kernel
          - build
        default: image
      armbian_kernel_branch:
        type: choice
        description: 'Kernel branch'
        options:
          - Legacy
          - current
          - edge
          - vendor  # 新增：支持rk内核（适配设备需求）
        default: 'current'
      armbian_release:
        type: choice
        description: 'Userspace'
        options:
          - jammy
          - mantic
          - bookworm
        default: bookworm
      armbian_ui:
        type: choice
        description: 'User interface (not all works)'
        options:
          - minimal
          - xfce
          - gnome
          - kde
        default: minimal
      armbian_board:
        type: string
        description: 'Board'
        required: true
        default: hinlink-ht2  # 默认填充目标设备
      armbian_version:
        type: string
        description: 'Version'
        required: false
        default: '24.5.0-trunk'  # 默认适配新版本
      armbian_release_tittle:
        type: string
        description: 'Release title'
        required: false
        default: "Armbian SDK"
      armbian_release_body:
        type: string
        description: 'Release body'
        required: false
        default: "Virtual images for ×86 and arm64"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Armbian
        uses: armbian/build@main  # 已更新为main分支（替换旧版v24.2.1）
        with:
          armbian_token: "${{secrets.GITHUB_TOKEN}}"
          armbian_target: "${{inputs.armbian_target}}"
          armbian_release: "${{inputs.armbian_release}}"
          armbian_kernel_branch: "${{inputs.armbian_kernel_branch}}"
          armbian_ui: "${{inputs.armbian_ui}}"
          armbian_board: "${{inputs.armbian_board}}"
          armbian_version: "${{inputs.armbian_version}}"  # 新增：传递版本参数
          armbian_release_tittle: "${{inputs.armbian_release_tittle}}"
          armbian_release_body: "${{inputs.armbian_release_body}}"
          armbian_pgp_key: "${{secrets.GPG_KEY1}}"
          armbian_pgp_password: "${{secrets.GPG_PASSPHRASE1}}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-${{inputs.armbian_board}}-${{inputs.armbian_release}}-${{inputs.armbian_kernel_branch}}
          path: ./output/*
