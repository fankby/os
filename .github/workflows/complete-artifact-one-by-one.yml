name: Build One by One (anyone)

on:
  workflow_dispatch:
    inputs:
      armbian_kernel_branch:
        type: choice
        description: 'Kernel branch'
        options:
          - Legacy
          - current
          - edge
          - vendor
        default: 'vendor'
      armbian_release:
        type: choice
        description: 'Release (Ubuntu 22.04=jammy)'
        options:
          - focal
          - jammy
          - lunar
          - mantic
          - noble
          - bookworm
          - trixie
          - sid
        default: 'jammy'
      armbian_ui:
        type: choice
        description: 'User interface (桌面环境)'
        options:
          - minimal
          - xfce
          - gnome
          - kde
          - mate
          - i3wm
        default: 'xfce'
      armbian_version:
        type: string
        description: 'Version (e.g., 24.5.0-trunk)'
        required: true
        default: '24.5.0-trunk'
      armbian_board:
        type: string
        description: 'Board (必须填hinlink-ht2)'
        required: true
        default: 'hinlink-ht2'
      armbian_release_tag:
        type: string
        description: 'Release tag (镜像名称标签)'
        required: true
        default: '24.5.0-trunk-ht2-ubuntu2204-xfce'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # 拉取完整仓库历史，避免依赖缺失

      - name: Build Armbian (Ubuntu 22.04 XFCE - 适配Hinlink-ht2)
        uses: armbian/build@main
        with:
          # 核心必填参数（严格遵循Armbian官方文档）
          armbian_token: "${{ secrets.GITHUB_TOKEN }}"
          armbian_target: "artifact"  # 唯一有效值，生成包含镜像的压缩包
          armbian_board: "${{ inputs.armbian_board }}"
          armbian_release: "${{ inputs.armbian_release }}"
          armbian_kernel_branch: "${{ inputs.armbian_kernel_branch }}"
          armbian_ui: "${{ inputs.armbian_ui }}"
          armbian_version: "${{ inputs.armbian_version }}"
          armbian_release_tag: "${{ inputs.armbian_release_tag }}"
          armbian_release_tittle: "Armbian-Hinlink-ht2-Ubuntu2204-XFCE"
          armbian_release_body: "适配Hinlink-ht2 | Ubuntu 22.04 LTS | XFCE桌面 | Vendor内核"
          
          # 可选参数（确保官方支持）
          armbian_compress: "xz"  # 压缩格式：xz（默认支持）
          armbian_artifacts: "image"  # 明确输出镜像产物（官方支持的有效值）
          
          # 移除所有非官方参数（避免Unknown argument错误）
          armbian_pgp_key: ""
          armbian_pgp_password: ""

      - name: 验证产物并解压镜像
        run: |
          # 查看artifact目录下的产物（Armbian默认输出压缩包）
          ls -l output/artifact/
          
          # 解压镜像压缩包到images目录（便于后续上传）
          mkdir -p output/images
          find output/artifact/ -name "*.img.xz" -exec cp {} output/images/ \;
          
          # 验证镜像文件是否存在
          if [ -z "$(find output/images/ -name '*.img.xz')" ]; then
              echo "错误：未生成镜像文件！"
              exit 1
          fi
          echo "镜像文件生成成功：$(find output/images/ -name '*.img.xz')"

      - name: 上传镜像产物
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.armbian_release_tag }}"
          path: output/images/*.img.xz
          retention-days: 7

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.armbian_release_tag }}"
          name: "Armbian ${{ inputs.armbian_version }} - Hinlink-ht2 - Ubuntu 22.04 XFCE"
          body: |
            ### 适配信息
            - 开发板：Hinlink-ht2/Solo派B（RK3528A）
            - 系统：Ubuntu 22.04 LTS (Jammy)
            - 桌面环境：XFCE（轻量低耗，适配嵌入式硬件）
            - 内核：${{ inputs.armbian_kernel_branch }}（RK原厂内核，硬件兼容性最优）
            - 镜像格式：.img.xz（需解压为.img文件后烧录）
            
            ### 使用步骤
            1. 下载镜像文件（.img.xz）
            2. 解压得到.img格式镜像（推荐使用7-Zip或tar命令：tar -xvf xxx.img.xz）
            3. 用BalenaEtcher/Win32 Disk Imager烧录到SD卡/eMMC（建议容量≥8GB）
            4. 插入开发板，连接HDMI显示器+键盘鼠标，上电启动
            5. 首次登录：账号root，密码1234（登录后强制修改密码）
          files: output/images/*.img.xz
          draft: false
          prerelease: false
