name: Build Hinlink-ht2 Ubuntu 22.04 XFCE

on:
  workflow_dispatch:  # 仅手动触发，无需输入参数（全硬编码）

jobs:
  build-ht2-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Armbian OS repo
        uses: actions/checkout@v4
        with:
          repository: armbian/os
          submodules: recursive
          fetch-depth: 0

      - name: 安装构建依赖（修复环境缺失）
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            debootstrap qemu-user-static binfmt-support \
            build-essential gcc-aarch64-linux-gnu git \
            flex bison libssl-dev python3-pip

      - name: 硬编码构建参数（避免传递丢失）
        run: |
          echo "BOARD=hinlink-ht2" >> $GITHUB_ENV
          echo "RELEASE=jammy" >> $GITHUB_ENV  # Ubuntu 22.04
          echo "BRANCH=vendor" >> $GITHUB_ENV  # RK原厂内核
          echo "UI=xfce" >> $GITHUB_ENV  # 桌面环境
          echo "VERSION=24.5.0-trunk" >> $GITHUB_ENV
          echo "TAG=ht2-ubuntu2204-xfce-vendor-24.5.0" >> $GITHUB_ENV

      - name: 执行Armbian原生编译脚本（绕开Action参数陷阱）
        run: |
          # 直接调用Armbian原生compile.sh，避免Action参数传递问题
          bash compile.sh \
            BOARD=${{ env.BOARD }} \
            RELEASE=${{ env.RELEASE }} \
            BRANCH=${{ env.BRANCH }} \
            BUILD_DESKTOP=yes \
            DESKTOP_ENVIRONMENT=${{ env.UI }} \
            DESKTOP_APPGROUPS_SELECTED="browsers,utilities" \
            VERSION=${{ env.VERSION }} \
            IMAGE_NAME="${{ env.TAG }}" \
            SHOW_DEBUG=yes \
            COMPRESS_IMAGE=xz

      - name: 验证镜像生成
        run: |
          ls -l output/images/
          # 检查是否生成镜像文件
          IMAGE_FILE=$(find output/images/ -name "*.img.xz" | head -n1)
          if [ -z "$IMAGE_FILE" ]; then
              echo "错误：未生成镜像文件！"
              exit 1
          fi
          echo "镜像生成成功：$IMAGE_FILE"
          echo "IMAGE_FILE=$IMAGE_FILE" >> $GITHUB_ENV

      - name: 上传镜像产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TAG }}
          path: ${{ env.IMAGE_FILE }}
          retention-days: 14

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Hinlink-ht2 - Ubuntu 22.04 XFCE - ${{ env.VERSION }}
          body: |
            ### 核心信息
            - 开发板：Hinlink-ht2/Solo派B（RK3528A）
            - 系统：Ubuntu 22.04 LTS (Jammy)
            - 桌面：XFCE（轻量低耗）
            - 内核：RK原厂Vendor内核
            - 镜像格式：.img.xz（需解压后烧录）
            
            ### 烧录使用
            1. 下载镜像并解压（tar -xvf xxx.img.xz）
            2. 用BalenaEtcher烧录到SD卡/eMMC（≥8GB）
            3. 首次登录：root / 1234（强制修改密码）
          files: ${{ env.IMAGE_FILE }}
          draft: false
          prerelease: false
