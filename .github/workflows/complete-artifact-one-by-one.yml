name: Build One by One (anyone)

on:
  workflow_dispatch:
    inputs:
      armbian_kernel_type:
        type: choice
        description: 'Kernel type'
        options:
          - current
          - edge
          - legacy
          - vendor  # 新增：支持RK3528A原厂内核
        default: 'current'
      armbian_kernel_branch:
        type: choice
        description: 'Kernel branch'
        options:
          - Legacy
          - current
          - edge
          - vendor  # 新增：支持RK原厂内核分支
        default: 'current'
      armbian_release:
        type: choice
        description: 'Release'
        options:
          - focal
          - jammy
          - lunar
          - mantic
          - noble
          - bookworm
          - trixie
          - sid
        default: 'noble'  # 适配Ubuntu 24.04
      armbian_ui:
        type: choice
        description: 'User interface'
        options:
          - minimal
          - xfce
          - gnome
          - kde
          - mate
          - i3wm
        default: 'xfce'
      armbian_version:
        type: string
        description: 'Version (e.g., 24.5.0-trunk)'
        required: true
        default: '24.5.0-trunk'
      armbian_board:
        type: string
        description: 'Board (e.g., hinlink-ht2)'
        required: true
        default: 'hinlink-ht2'  # HT2开发板型号

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build artifact
        uses: armbian/build@main  # 原v24.2.1改为main，使用最新稳定版
        with:
          armbian_token: "${{ secrets.GITHUB_TOKEN }}"
          armbian_target: "artifact"
          armbian_release: "${{ inputs.armbian_release }}"
          armbian_kernel_branch: "${{ inputs.armbian_kernel_branch }}"
          armbian_ui: "${{ inputs.armbian_ui }}"
          armbian_board: "${{ inputs.armbian_board }}"
          armbian_release_title: "Armbian ${{ inputs.armbian_version }} for ${{ inputs.armbian_board }}"
          armbian_release_body: "Custom build for Hinlink-ht2/Solo派B"
          armbian_pgp_key: "${{ secrets.GPG_KEY1 }}"
          armbian_pgp_password: "${{ secrets.GPG_PASSPHRASE1 }}"
          armbian_version: "${{ inputs.armbian_version }}"  # 新增：传递版本参数

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: armbian-artifact-${{ inputs.armbian_board }}-${{ inputs.armbian_release }}-${{ inputs.armbian_ui }}
          path: output/artifact/*
          retention-days: 7

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.armbian_version }}-${{ inputs.armbian_board }}-${{ inputs.armbian_release }}-${{ inputs.armbian_ui }}"
          name: "Armbian ${{ inputs.armbian_version }} - ${{ inputs.armbian_board }} - ${{ inputs.armbian_release }} - ${{ inputs.armbian_ui }}"
          body: "Custom build for Hinlink-ht2/Solo派B. Kernel: ${{ inputs.armbian_kernel_branch }}, UI: ${{ inputs.armbian_ui }}"
          files: output/artifact/*
          draft: false
          prerelease: false
